# Solution Documentation Schema
# This schema MUST be validated before writing any documentation file

required_fields:
  area:
    type: string
    description: "Project area or module (e.g., 'API Layer', 'Android Client', 'Worker Infrastructure')"
    examples:
      - "API Layer"
      - "Android Client"
      - "Worker Infrastructure"
      - "Frontend Dashboard"
      - "Build System"
      - "Database"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date when this problem was solved (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error          # Compilation, bundling, dependency resolution errors
      - test_failure         # Test failures, flaky tests
      - runtime_error        # Exceptions, crashes during execution
      - performance_issue    # Slow queries, memory issues, N+1 queries
      - database_issue       # Migration, query, schema problems
      - security_issue       # Authentication, authorization, XSS, SQL injection
      - ui_bug               # Frontend rendering, layout, interaction issues
      - integration_issue    # External service, API integration problems
      - logic_error          # Business logic bugs
      - config_error         # Environment, deployment, configuration issues
      - developer_experience # DX issues: workflow, tooling, dev setup
      - workflow_issue       # Development process, missing steps
      - best_practice        # Documenting patterns and practices to follow
      - documentation_gap    # Missing or inadequate documentation
    description: "Primary category of the problem"

  component:
    type: enum
    values:
      - frontend             # Web UI, dashboard, client-side rendering
      - backend              # Server-side logic, API handlers
      - api                  # API contracts, endpoints, serialization
      - database             # Schema, migrations, queries
      - mobile               # Android/iOS app code
      - worker               # Background jobs, Cloudflare Workers, serverless functions
      - infrastructure       # Docker, CI/CD, deployment, cloud services
      - build_system         # Bundlers, compilers, package managers
      - testing              # Test setup, fixtures, mocks
      - config               # Environment variables, settings, secrets
      - documentation        # README, guides, inline docs
      - tooling              # Scripts, generators, CLI tools
    description: "Technical component involved"

  symptoms:
    type: array[string]
    min_items: 1
    max_items: 5
    description: "Observable symptoms (error messages, visual issues, crashes)"
    examples:
      - "TypeError: Cannot read property 'id' of undefined"
      - "Build fails with ENOENT on wrangler.toml"
      - "Foreign key constraint violation on session creation"

  root_cause:
    type: enum
    values:
      - missing_dependency    # Missing import, package, or module
      - missing_optimization  # Missing eager loading, indexing, caching
      - wrong_api             # Using deprecated/incorrect API
      - type_mismatch         # Serialization, type conversion error
      - race_condition        # Timing, concurrency, async issue
      - memory_issue          # Memory leak or excessive allocation
      - config_error          # Configuration or environment issue
      - logic_error           # Algorithm/business logic bug
      - constraint_violation  # FK, unique, validation constraint failure
      - missing_validation    # Missing input validation
      - missing_permission    # Authorization check missing
      - platform_issue        # OS/platform-specific problem (Windows/WSL/Docker)
      - version_mismatch      # Incompatible library/framework versions
      - missing_migration     # Database schema out of sync
      - incomplete_setup      # Missing config, env vars, or seed data
    description: "Fundamental cause of the problem"

  resolution_type:
    type: enum
    values:
      - code_fix             # Fixed by changing source code
      - migration            # Fixed by database migration
      - config_change        # Fixed by changing configuration
      - test_fix             # Fixed by correcting tests
      - dependency_update    # Fixed by updating/adding dependency
      - environment_setup    # Fixed by environment configuration
      - workaround           # Applied workaround for platform/tool limitation
      - documentation_update # Added or updated documentation
      - tooling_addition     # Added helper script or automation
    description: "Type of fix applied"

  severity:
    type: enum
    values:
      - critical             # Blocks build or core functionality (build fails, data loss)
      - high                 # Impairs core functionality (feature broken, security issue)
      - medium               # Affects specific feature (UI broken, performance impact)
      - low                  # Minor issue or edge case
    description: "Impact severity"

optional_fields:
  framework_version:
    type: string
    description: "Framework/runtime version where this was encountered"

  platform:
    type: string
    description: "OS/platform details (e.g., 'Windows 11 + WSL2', 'macOS 14')"

  related_components:
    type: array[string]
    description: "Other components that interact with this issue"

  tags:
    type: array[string]
    max_items: 8
    description: "Searchable keywords (lowercase, hyphen-separated)"
    examples:
      - "n-plus-one"
      - "wrangler"
      - "serialization"
      - "fk-constraint"
      - "wsl"

validation_rules:
  - "area must describe a project area or module"
  - "date must be in YYYY-MM-DD format"
  - "problem_type must match one of the enum values"
  - "component must match one of the enum values"
  - "symptoms must be specific and observable (not vague)"
  - "root_cause must be the ACTUAL cause, not a symptom"
  - "resolution_type must match one of the enum values"
  - "severity must match one of the enum values"
  - "tags should be lowercase, hyphen-separated"
