interface:
  display_name: "WF Quick"
  short_description: "Standalone investigative and compressed-entry workflows. Dispatches to one of 9 sub-commands — quick (compressed planning for small changes), rca (root-cause analysis from a symptom), investigate (solution-options sketcher — proposes 2–3 distinct engineering approaches with tradeoffs, no winner picked), discover (hypothesis-test — adjudicates a code-level claim and returns a verdict with cited evidence), hotfix (active-incident emergency fix), update-deps (dependency upgrades), docs (documentation-only workflow), refactor (refactoring workflow), ideate (codebase improvement ideation). Auto-trigger when the user wants to start a compressed/standalone workflow, sketch solution options for a problem, test a code-level hypothesis, run a root-cause analysis, plan a hotfix, upgrade dependencies, write documentation, refactor, or ideate on improvements. The full-lifecycle intake stage moved to /wf intake so all canonical lifecycle stages live under one router."
  default_prompt: "Use $wf-quick for this workflow."
policy:
  allow_implicit_invocation: false
