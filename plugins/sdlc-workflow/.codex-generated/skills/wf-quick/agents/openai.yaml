interface:
  display_name: "WF Quick"
  short_description: "Standalone investigative and compressed-entry workflows. Dispatches to one of 9 sub-commands — quick (compressed planning for small changes), rca (root-cause analysis), investigate (investment discovery), discover (problem validation), hotfix (active-incident emergency fix), update-deps (dependency upgrades), docs (documentation-only workflow), refactor (refactoring workflow), ideate (codebase improvement ideation). Auto-trigger when the user wants to start a compressed/standalone workflow, kick off an investigation, run a root-cause analysis, validate a problem, plan a hotfix, upgrade dependencies, write documentation, refactor, or ideate on improvements. The full-lifecycle intake stage moved to /wf intake so all canonical lifecycle stages live under one router. Replaces the v8 standalone /wf-quick, /wf-rca, /wf-investigate, /wf-discover, /wf-hotfix, /wf-update-deps, /wf-docs, /wf-refactor, /wf-ideate commands."
  default_prompt: "Use $wf-quick for this workflow."
policy:
  allow_implicit_invocation: false
