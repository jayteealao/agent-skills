interface:
  display_name: "Review"
  short_description: "Code review skill. Use to review code for correctness, security, performance, architecture, scalability, accessibility, UX, infrastructure, observability, supply chain, privacy, data integrity, refactor safety, maintainability, testing, and 16+ other dimensions. Single-dimension reviews (`/review <dim>`) run inline against one rubric. Multi-dimension sweeps (`/review sweep <aggregate>` — all, architecture, infra, pre-merge, quick, security, ux) dispatch one reviewer sub-agent per dimension in parallel and synthesize a unified verdict. Auto-trigger on review/audit requests scoped to a PR, worktree, diff, file, or repo."
  default_prompt: "Use $review for this workflow."
policy:
  allow_implicit_invocation: false
